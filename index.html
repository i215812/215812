<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>215812</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
}

/* 🎬 الفيديو */
#introVideo {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 5;
    transition: opacity 1s ease;
}

/* 🖼 الخلفية */
.background {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url("bg.jpg") center/cover no-repeat;
    z-index: 0;
    filter: brightness(0.6); /* يخليها cinematic */
}

/* 💻 المحتوى */
.container {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;

    opacity: 0;
    transform: translateY(20px);
    transition: all 1.5s ease;
}

/* ✨ النص بتدرج من الصورة */
.title {
    font-size: 90px;
    font-weight: bold;
    background: linear-gradient(90deg, #aaa, #ddd, #888);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* النص الفرعي */
.subtitle {
    margin-top: 15px;
    font-size: 18px;
    opacity: 0.8;
    background: linear-gradient(90deg, #bbb, #eee, #999);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* الفوتر */
.footer {
    position: absolute;
    bottom: 25px;
    width: 100%;
    text-align: center;
}

.footer a {
    color: #ccc;
    margin: 0 12px;
    text-decoration: none;
    transition: 0.3s;
}

.footer a:hover {
    color: white;
}
</style>
</head>

<body>

<!-- 🎬 فيديو البداية -->
<video id="introVideo" autoplay muted playsinline>
    <source src="intro.mp4" type="video/mp4">
</video>

<!-- 🖼 الخلفية -->
<div class="background"></div>

<!-- 💻 المحتوى -->
<div class="container" id="mainContent">
    <div class="title">215812</div>
    <div class="subtitle">Perhaps it will come to you soon, I don't know.</div>

    <div class="footer">
        <a href="#">Instagram</a>
        <a href="#">Twitter</a>
        <a href="#">WhatsApp</a>
        <a href="#">Email</a>
    </div>
</div>

<script>
const video = document.getElementById("introVideo");
const content = document.getElementById("mainContent");

/* لما يخلص الفيديو */
video.onended = () => {
    video.style.opacity = "0";

    setTimeout(() => {
        video.style.display = "none";
        content.style.opacity = "1";
        content.style.transform = "translateY(0)";
    }, 1000);
};

/* fallback */
setTimeout(() => {
    video.style.opacity = "0";
    content.style.opacity = "1";
    content.style.transform = "translateY(0)";
}, 6000);
</script>

</body>
</html>
